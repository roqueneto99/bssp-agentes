# Config Nixpacks para Railway
# Fixa versão do Python e garante que migrations rodem no release phase.

[phases.setup]
nixPkgs = ["python311", "postgresql_15"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'Build OK - painel pronto'"]

[start]
cmd = "uvicorn painel:app --host 0.0.0.0 --port $PORT"
